<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kubera_V5Pro Final locked</title>
  <meta name="theme-color" content="#120a05">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=UnifrakturCook:wght@700&display=swap');
    body {
      background: linear-gradient(rgba(26,15,10,0.88), rgba(26,15,10,0.96)), 
                  url('https://picsum.photos/id/1015/2000/1200') center/cover fixed !important;
    }
    .boards-compact .board-block {
      background: rgba(43,31,15,0.65) !important;
      backdrop-filter: blur(14px);
      border: 8px solid rgba(255,215,0,0.65) !important;
      border-radius: 22px !important;
      box-shadow: 0 0 30px rgba(255,215,0,0.5);
    }
    .treasure-grid.compact > div {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4) !important;
    }
    .treasure-grid.compact > div:active {
      transform: scale(0.94) !important;
      box-shadow: 0 0 25px #FFD700 !important;
    }
    .sparkle {
      position: fixed;
      font-size: 1.7rem;
      pointer-events: none;
      z-index: 9999;
      animation: sparkleAnim 2.8s forwards;
    }
    @keyframes sparkleAnim {
      0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.6) rotate(360deg); }
    }
  </style>
</head>
