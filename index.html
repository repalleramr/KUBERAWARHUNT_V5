<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Mythology Treasury War | Kubera_V5Pro Final locked</title>
  <meta name="theme-color" content="#8B0000">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  
  <!-- 🔥 MYTHOLOGY TREASURY WAR GAMING UI - FITS YOUR SCREENSHOT PERFECTLY -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=UnifrakturCook:wght@700&display=swap');
    
    :root {
      --gold: #FFD700;
      --blood: #8B0000;
      --obsidian: #1a0f0a;
      --temple: #2b1f0f;
    }
    
    /* EPIC BATTLEFIELD BACKGROUND - Ancient Treasury War Temple */
    body {
      background: linear-gradient(rgba(26,15,10,0.92), rgba(26,15,10,0.97)), 
                  url('https://picsum.photos/id/1015/2000/1200') center/cover fixed !important;
      color: #fff;
      font-family: 'Cinzel', serif;
      position: relative;
      overflow-y: auto;
    }
    
    /* FIXED HEADER + LIVE BANKROLL - Exactly like your screenshot (no scroll) */
    .fixed-shell .topbar {
      background: linear-gradient(90deg, #8B0000, #FFD700, #8B0000) !important;
      border-bottom: 6px solid var(--gold);
      box-shadow: 0 0 30px rgba(255,215,0,0.9);
      padding: 8px 12px;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    .fixed-shell .topbar::before {
      content: '⚔️ TREASURY WAR ⚔️';
      position: absolute;
      top: -6px; left: 50%;
      transform: translateX(-50%);
      background: #110000;
      color: var(--gold);
      font-family: 'UnifrakturCook', cursive;
      font-size: 1.05rem;
      padding: 0 18px;
      border: 3px solid var(--gold);
      box-shadow: 0 0 20px #FFD700;
    }
    .brand {
      font-family: 'UnifrakturCook', cursive !important;
      font-size: 1.45rem;
      text-shadow: 0 0 15px #FFD700;
    }
    #screenTitle {
      font-size: 1.65rem !important;
      text-shadow: 0 0 20px var(--gold);
    }
    
    /* LIVE BANKROLL - Prominent like screenshot */
    .bankroll-card {
      background: linear-gradient(#1a1208, #2b1f0f) !important;
      border: 8px solid var(--gold) !important;
      border-radius: 16px !important;
      margin: 8px 12px 12px;
      padding: 14px 20px;
      box-shadow: 0 0 35px rgba(255,215,0,0.7),
                  inset 0 0 40px rgba(139,0,0,0.6) !important;
    }
    .label { font-size: 1.1rem; letter-spacing: 3px; color: #FFD700; }
    #bankValue {
      font-size: 2.4rem !important;
      font-weight: 700;
      color: #FF4D4D;
      text-shadow: 0 0 15px #FF4D4D;
    }
    
    /* Y & K BOARDS - Exact screenshot style with mythology gold frames */
    .boards-compact .board-block {
      background: rgba(43,31,15,0.95) !important;
      border: 10px solid var(--gold) !important;
      border-radius: 20px !important;
      box-shadow: 0 0 30px #FFD700;
      padding: 12px;
      margin-bottom: 12px;
    }
    .board-title {
      background: linear-gradient(#8B0000, #FFD700) !important;
      color: #110000 !important;
      font-family: 'UnifrakturCook', cursive;
      font-size: 2.4rem !important;
      text-align: center;
      border-radius: 12px;
      margin-bottom: 10px;
      text-shadow: 0 0 12px #fff;
    }
    
    .treasure-grid.compact {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 8px;
    }
    .treasure-grid.compact > div {
      background: linear-gradient(#d4a017, #8B5A00) !important;
      border-radius: 16px !important;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 1.65rem;
      font-weight: bold;
      color: #110000;
      box-shadow: 0 6px 0 #5c3a00, inset 0 0 20px rgba(255,255,255,0.4);
      transition: all 0.2s;
      position: relative;
    }
    .treasure-grid.compact > div:active {
      transform: scale(0.92);
      box-shadow: 0 2px 0 #5c3a00;
    }
    .treasure-grid.compact > div .small {
      font-size: 0.85rem;
      font-weight: normal;
      margin-top: 2px;
      opacity: 0.9;
    }
    /* L & C color coding like screenshot */
    .treasure-grid.compact > div[data-state="L"] .small { color: #00ff88; }
    .treasure-grid.compact > div[data-state="C"] .small { color: #ff3366; }
    
    /* 0 tiles */
    .treasure-grid.compact > div.zero {
      grid-column: span 3;
      background: linear-gradient(#8B0000, #FFD700) !important;
      color: #110000;
      font-size: 2rem;
    }
    
    /* ACTION STRIP - Exact screenshot button layout */
    .action-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin: 12px;
    }
    .strip-btn, .warn {
      padding: 14px 10px !important;
      font-size: 1.05rem !important;
      font-weight: bold;
      border-radius: 50px !important;
      border: 4px solid var(--gold) !important;
      box-shadow: 0 8px 0 #5c3a00 !important;
    }
    .warn { background: linear-gradient(#8B0000, #FF4D4D) !important; color: #fff !important; }
    .strip-btn:not(.warn) { background: linear-gradient(#f5f0e0, #d4c090) !important; color: #110000 !important; }
    
    /* LAST RESULT + NEXT ĀHUTI - Screenshot style */
    .compact-card {
      margin: 12px;
      background: linear-gradient(#1a1208, #2b1f0f) !important;
      border: 8px solid var(--gold) !important;
      border-radius: 16px !important;
    }
    .last-result, .ahuti-row, .total {
      font-size: 1.4rem;
      padding: 10px 18px;
    }
    
    /* BOTTOM NAV - Exact screenshot icons + labels */
    .bottom-nav {
      background: #110000 !important;
      border-top: 8px solid var(--gold) !important;
      box-shadow: 0 -10px 30px rgba(255,215,0,0.8) !important;
      padding: 6px 0;
    }
    .bottom-nav button {
      font-size: 0.95rem !important;
      color: var(--gold) !important;
      text-shadow: 0 0 12px #FFD700;
    }
    .bottom-nav button.active {
      background: linear-gradient(#FFD700, #8B0000) !important;
      color: #110000 !important;
    }
    
    /* Sparkle particles - real gaming feel */
    .sparkle {
      position: fixed;
      font-size: 1.6rem;
      pointer-events: none;
      z-index: 9999;
      animation: sparkleAnim 2.8s forwards;
    }
    @keyframes sparkleAnim {
      0% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.6) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="toastLayer" class="toast-layer" aria-live="polite" aria-atomic="true"></div>
  <div id="app">
    <header class="fixed-shell">
      <div class="topbar">
        <div>
          <div class="brand">Kubera_V5Pro Final locked</div>
          <div id="screenTitle" class="screen-title">⚔ SANGRAM</div>
        </div>
        <button id="installBtn" class="install-btn hidden" type="button">Install</button>
      </div>
      
      <!-- LIVE BANKROLL - Prominent & fixed like your screenshot -->
      <section class="card glow bankroll-card">
        <div class="label">AXYAPATRA</div>
        <div id="bankValue" class="bank">₹ 30,000</div>
      </section>
    </header>

    <main class="content-pad">
      <!-- SANGAM SCREEN - Exact layout from your screenshot -->
      <section id="screen-sangram" class="screen active">
        <section class="boards-compact sangram-boards">
          <div class="board-block">
            <div class="board-title">Y</div>
            <div id="boardY" class="treasure-grid compact"></div>
          </div>
          <div class="board-block">
            <div class="board-title">K</div>
            <div id="boardK" class="treasure-grid compact"></div>
          </div>
        </section>

        <section class="action-strip compact-card">
          <button id="kumbhaBtn" class="warn strip-btn" type="button">Clear Kumbha</button>
          <button id="undoBtn" class="strip-btn" type="button">Undo</button>
          <button id="redoBtn" class="strip-btn" type="button">Redo</button>
          <button id="prayogaBtn" class="strip-btn" type="button">Prayoga</button>
        </section>

        <section class="card compact-card">
          <div class="label">LAST RESULT</div>
          <div id="lastResultValue" class="last-result">-</div>
        </section>

        <section class="card compact-card">
          <div class="label">NEXT ĀHUTI</div>
          <div id="nextY" class="ahuti-row">Y -</div>
          <div id="nextK" class="ahuti-row">K -</div>
          <div id="nextT" class="total">T 0</div>
        </section>

        <section class="card compact-card chakra-card">
          <div class="chakra-line chakra-right">
            <div class="chakra-copy">
              <div class="label">CHAKRA</div>
              <div id="chakraValue" class="chakra-value">Round : 0</div>
            </div>
          </div>
        </section>
      </section>

      <!-- Other screens remain unchanged (your original logic) -->
      <section id="screen-vyuha" class="screen">
        <div class="split-grid">
          <section class="card"><div class="label">YAKSHA</div><div id="vyuhaY" class="state-grid"></div></section>
          <section class="card"><div class="label">KINNARA</div><div id="vyuhaK" class="state-grid"></div></section>
        </div>
      </section>

      <section id="screen-granth" class="screen"> ... (your original code) </section>
      <section id="screen-drishti" class="screen"> ... (your original code) </section>
      <section id="screen-sopana" class="screen"> ... (your original code) </section>
      <section id="screen-yantra" class="screen"> ... (your original code) </section>
      <section id="screen-medha" class="screen"> ... (your original code) </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav active" data-target="sangram" type="button">⚔<span>Sangram</span></button>
      <button class="nav" data-target="vyuha" type="button">🛡<span>Vyuha</span></button>
      <button class="nav" data-target="granth" type="button">📜<span>Granth</span></button>
      <button class="nav" data-target="drishti" type="button">👁<span>Drishti</span></button>
      <button class="nav" data-target="sopana" type="button">🪜<span>Sopana</span></button>
      <button class="nav" data-target="yantra" type="button">⚙<span>Yantra</span></button>
      <button class="nav" data-target="medha" type="button">🧠<span>Medha</span></button>
    </nav>
  </div>

  <div id="confirmOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmText">
      <div id="confirmTitle" class="modal-title">KUMBHA CLEAR</div>
      <div id="confirmText" class="modal-text">Clear current Kumbh?</div>
      <div class="modal-actions">
        <button id="confirmCancelBtn" type="button">Cancel</button>
        <button id="confirmOkBtn" class="warn" type="button">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

  <!-- ✨ Golden sparkles for real gaming feel -->
  <script>
    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.innerHTML = Math.random() > 0.5 ? '✨' : '💎';
      sparkle.style.left = Math.random() * 100 + 'vw';
      sparkle.style.top = Math.random() * 70 + 'vh';
      sparkle.style.color = '#FFD700';
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 2800);
    }
    setInterval(() => { if (Math.random() > 0.55) createSparkle(); }, 180);
    window.addEventListener('load', () => {
      for(let i = 0; i < 22; i++) setTimeout(createSparkle, i * 35);
    });
  </script>
</body>
</html>
